<div class="overlay" (click)="onCloseClick()"></div>

<div class="container" role="dialog" aria-modal="true">
  <div class="image">
    <img [src]="product()?.image" [alt]="product()?.name" />
  </div>

  <div class="details">
    <div class="details-header">
      <h2>{{ product()?.name }}</h2>
    </div>

    <p>{{ product()?.description }}</p>
    <div class="prices">
      <h4 class="new-price">{{ product()?.soldPrice | number:'1.0-0' }} FCFA</h4>
      <h4 class="regular-price">{{ product()?.regularPrice | number:'1.0-0' }} FCFA</h4>
    </div>
    <p>Créé le {{ product()?.createdAt | date:'dd/MM/yyyy' }}</p>

    <div class="actions">
      <button class="btn btn-favorite" [class.disabled]="isFavorite()" [disabled]="isFavorite()" (click)="onAddToFavorites()">
        <span class="btn-icon">❤</span>
        <span>{{ isFavorite() ? 'Déjà favoris' : 'Ajouter aux favoris' }}</span>
      </button>
      <button class="btn btn-close" (click)="onCloseClick()">
        <span class="btn-icon">✕</span>
        <span>Fermer</span>
      </button>
    </div>
  </div>
</div>
